policy:
  brand_safety:
    initial_color: GREEN
    colors:
    - GREEN
    - YELLOW
    - RED
    - BLACK
  content_filter:
    blocked_topics:
    - partisan_politics
    - religion
    - personal_attacks
    - competitor_bashing
    - financial_advice
    - medical_claims
    cannabis_rules:
      never_say:
      - replace your staff
      - cut headcount
      - fire your compliance team
      always_say_instead:
      - free your team
      - scale without adding overhead
      - let your people do what they're best at
    tier1_requires_approval: true
    tier2_requires_approval: true
  rate_limits:
    max_actions_per_hour: 30
    cooldown_after_error_minutes: 15
    backoff_multiplier: 2.0
    max_backoff_minutes: 60
trust:
  current_phase: B
growth:
  content_mix:
    value_teaching: 0.5
    social_proof: 0.3
    engagement_bait: 0.2
  tiers:
    tier1:
      description: Kingmakers - 100K+ followers, industry leaders
      max_daily_interactions: 3
      requires_approval: true
    tier2:
      description: Amplifiers - 10K-100K followers, active voices
      max_daily_interactions: 10
      requires_approval: true
    tier3:
      description: Community - 1K-10K followers, engaged practitioners
      max_daily_interactions: 20
      requires_approval: false
